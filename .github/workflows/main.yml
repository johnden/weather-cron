name: 每日天气播报

on:
  schedule:
  - cron: '0 22,10 * * *'
  workflow_dispatch: {}

jobs:
  weather:
  runs-on: ubuntu-latest
  steps:
  - uses: actions/checkout@v4
  - uses: actions/setup-python@v5
  with:
  python-version: '3.11'
  - run: pip install requests
  - run: python src/weather.py
  env:
  CITY: 广州
  FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
